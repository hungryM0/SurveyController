name: Upload Release to R2

on:
  release:
    types: [published]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${{ github.event.release.tag_name }}" -D dist

          echo "Downloaded files:"
          ls -lah dist

      - name: Install AWS CLI
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Upload EXE to R2 with unified name
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail

          FILE="$(find dist -maxdepth 1 -type f -name '*.exe' | head -n 1)"

          if [ -z "${FILE}" ]; then
            echo "No .exe asset found in this release"
            exit 1
          fi

          echo "Uploading: ${FILE}"

          aws s3 cp "${FILE}" \
            "s3://${R2_BUCKET}/fuck-wjx_latest.exe" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Upload versioned copy to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail

          FILE="$(find dist -maxdepth 1 -type f -name '*.exe' | head -n 1)"
          TAG="${{ github.event.release.tag_name }}"

          aws s3 cp "${FILE}" \
            "s3://${R2_BUCKET}/fuck-wjx_${TAG}.exe" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Show download URLs
        run: |
          echo "Latest:"
          echo "https://dl.hungrym0.top/fuck-wjx_latest.exe"
          echo
          echo "Versioned:"
          echo "https://dl.hungrym0.top/fuck-wjx_${{ github.event.release.tag_name }}.exe"